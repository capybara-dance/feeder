name: Sync Oracle Release Full 10Y

on:
  workflow_dispatch:
    inputs:
      release_repo:
        description: GitHub release repo (owner/name)
        required: false
        default: capybara-dance/capybara_fetcher
        type: string
      release_tag:
        description: Optional release tag (empty = latest)
        required: false
        default: ""
        type: string
      batch_size:
        description: Oracle executemany batch size
        required: false
        default: "2000"
        type: string
      commit_every_batches:
        description: Commit cadence for executemany batches (default 1)
        required: false
        default: "1"
        type: string
      no_progress:
        description: Disable progress bar and use plain logs
        required: false
        default: false
        type: boolean

jobs:
  sync-release-full:
    runs-on: ubuntu-latest
    env:
      OCI_DB_USER: ${{ secrets.OCI_DB_USER }}
      OCI_DB_PW: ${{ secrets.OCI_DB_PW }}
      OCI_DB_DSN: ${{ secrets.OCI_DB_DSN }}
      OCI_WALLET: ${{ secrets.OCI_WALLET }}
      OCI_WALLET_PW: ${{ secrets.OCI_WALLET_PW }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID_TEST: ${{ secrets.TELEGRAM_CHAT_ID_TEST }}
      TELEGRAM_CHAT_ID_STOCK: ${{ secrets.TELEGRAM_CHAT_ID_STOCK }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build run arguments
        id: args
        shell: bash
        run: |
          ARGS="--source release --mode full-10y --release-repo ${{ inputs.release_repo }} --batch-size ${{ inputs.batch_size }} --tables industry,master,price"
          echo "OCI_COMMIT_EVERY_BATCHES=${{ inputs.commit_every_batches }}" >> "${GITHUB_ENV}"

          if [[ -n "${{ inputs.release_tag }}" ]]; then
            ARGS+=" --release-tag ${{ inputs.release_tag }}"
          fi
          if [[ "${{ inputs.no_progress }}" == "true" ]]; then
            ARGS+=" --no-progress"
          fi

          echo "args=${ARGS}" >> "${GITHUB_OUTPUT}"

      - name: Run sync_oracle (release full 10y)
        shell: bash
        run: |
          python scripts/sync_oracle.py ${{ steps.args.outputs.args }}

      - name: Upload sync report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-oracle-release-full-report-${{ github.run_id }}
          path: reports/sync_oracle_report.html
          if-no-files-found: warn
          retention-days: 14
