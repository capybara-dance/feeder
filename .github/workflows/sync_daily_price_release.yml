name: Sync Daily Price Release Daily Syncer

on:
  workflow_dispatch:
    inputs:
      lookback_days:
        description: Lookback window in days (latest release, recent range)
        required: false
        default: "10"
        type: string
      release_repo:
        description: GitHub release repo (owner/name)
        required: false
        default: capybara-dance/capybara_fetcher
        type: string
      release_tag:
        description: Optional release tag (empty = latest)
        required: false
        default: ""
        type: string
      batch_size:
        description: Oracle executemany batch size
        required: false
        default: "2000"
        type: string
      no_progress:
        description: Disable progress bar and use plain logs
        required: false
        default: false
        type: boolean
      dry_run:
        description: Collect only, skip DB upsert
        required: false
        default: false
        type: boolean

  # Every day 21:00 KST (12:00 UTC)
  schedule:
    - cron: "0 12 * * *"

jobs:
  sync-daily-price-daily:
    runs-on: ubuntu-latest
    env:
      OCI_DB_USER: ${{ secrets.OCI_DB_USER }}
      OCI_DB_PW: ${{ secrets.OCI_DB_PW }}
      OCI_DB_DSN: ${{ secrets.OCI_DB_DSN }}
      OCI_WALLET: ${{ secrets.OCI_WALLET }}
      OCI_WALLET_PW: ${{ secrets.OCI_WALLET_PW }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID_TEST: ${{ secrets.TELEGRAM_CHAT_ID_TEST }}
      TELEGRAM_CHAT_ID_STOCK: ${{ secrets.TELEGRAM_CHAT_ID_STOCK }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build run arguments
        id: args
        shell: bash
        run: |
          ARGS="--lookback-days 10 --batch-size 2000 --release-repo capybara-dance/capybara_fetcher"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -n "${{ inputs.lookback_days }}" ]]; then ARGS+=" --lookback-days ${{ inputs.lookback_days }}"; fi
            if [[ -n "${{ inputs.release_repo }}" ]]; then ARGS+=" --release-repo ${{ inputs.release_repo }}"; fi
            if [[ -n "${{ inputs.release_tag }}" ]]; then ARGS+=" --release-tag ${{ inputs.release_tag }}"; fi
            if [[ -n "${{ inputs.batch_size }}" ]]; then ARGS+=" --batch-size ${{ inputs.batch_size }}"; fi
            if [[ "${{ inputs.no_progress }}" == "true" ]]; then ARGS+=" --no-progress"; fi
            if [[ "${{ inputs.dry_run }}" == "true" ]]; then ARGS+=" --dry-run"; fi
          fi

          echo "args=${ARGS}" >> "${GITHUB_OUTPUT}"

      - name: Run sync_daily_price_release
        shell: bash
        run: |
          python scripts/sync_daily_price_release.py ${{ steps.args.outputs.args }}

      - name: Upload sync report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-daily-price-daily-report-${{ github.run_id }}
          path: reports/sync_oracle_report.html
          if-no-files-found: warn
          retention-days: 14
