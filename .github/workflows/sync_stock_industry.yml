name: Sync Stock Industry

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: Oracle executemany batch size
        required: false
        default: "2000"
        type: string
      test_limit:
        description: Optional ticker limit (0 = all)
        required: false
        default: "0"
        type: string
      market:
        description: Optional market filter (KOSPI/KOSDAQ/ETF)
        required: false
        default: ""
        type: string
      dry_run:
        description: Collect only, skip DB upsert
        required: false
        default: false
        type: boolean

  # 1st day of month 09:30 KST (00:30 UTC)
  schedule:
    - cron: "30 0 1 * *"

jobs:
  sync-stock-industry:
    runs-on: ubuntu-latest
    env:
      OCI_DB_USER: ${{ secrets.OCI_DB_USER }}
      OCI_DB_PW: ${{ secrets.OCI_DB_PW }}
      OCI_DB_DSN: ${{ secrets.OCI_DB_DSN }}
      OCI_WALLET: ${{ secrets.OCI_WALLET }}
      OCI_WALLET_PW: ${{ secrets.OCI_WALLET_PW }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID_TEST: ${{ secrets.TELEGRAM_CHAT_ID_TEST }}
      TELEGRAM_CHAT_ID_STOCK: ${{ secrets.TELEGRAM_CHAT_ID_STOCK }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build run arguments
        id: args
        shell: bash
        run: |
          ARGS="--batch-size 2000 --test-limit 0"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -n "${{ inputs.batch_size }}" ]]; then ARGS+=" --batch-size ${{ inputs.batch_size }}"; fi
            if [[ -n "${{ inputs.test_limit }}" ]]; then ARGS+=" --test-limit ${{ inputs.test_limit }}"; fi
            if [[ -n "${{ inputs.market }}" ]]; then ARGS+=" --market ${{ inputs.market }}"; fi
            if [[ "${{ inputs.dry_run }}" == "true" ]]; then ARGS+=" --dry-run"; fi
          fi

          echo "args=${ARGS}" >> "${GITHUB_OUTPUT}"

      - name: Run sync_table_stock_industry
        shell: bash
        run: |
          python scripts/sync_table_stock_industry.py ${{ steps.args.outputs.args }}

      - name: Upload sync report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-stock-industry-report-${{ github.run_id }}
          path: reports/sync_oracle_report.html
          if-no-files-found: warn
          retention-days: 14
